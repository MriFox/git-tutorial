<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="600" height="400" fill="#f6f8fa"/>
  
  <!-- 顶部导航栏 -->
  <rect width="600" height="50" fill="#24292f"/>
  <text x="20" y="32" fill="white" font-size="16" font-weight="bold">GitHub</text>
  
  <!-- 标签栏 -->
  <rect x="0" y="50" width="600" height="45" fill="#f6f8fa"/>
  <text x="160" y="78" fill="#24292f" font-size="13">代码</text>
  <text x="270" y="78" fill="#24292f" font-size="13">Issues</text>
  <text x="355" y="78" fill="#24292f" font-size="13" font-weight="bold">Pull requests</text>
  
  <!-- PR页面内容 -->
  <rect x="20" y="110" width="560" height="270" fill="white" rx="6"/>
  
  <!-- 标题和按钮 -->
  <text x="40" y="140" fill="#24292f" font-size="18" font-weight="bold">Pull requests</text>
  
  <!-- New pull request按钮 -->
  <rect x="400" y="120" width="160" height="35" fill="#2da44e" rx="6"/>
  <text x="420" y="142" fill="white" font-size="13" font-weight="bold">New pull request</text>
  
  <!-- PR列表 -->
  <rect x="40" y="160" width="520" height="70" fill="white" stroke="#d0d7de" rx="4"/>
  <circle cx="60" cy="195" r="12" fill="#2da44e"/>
  <text x="80" y="190" fill="#24292f" font-size="13" font-weight="bold">添加登录功能</text>
  <text x="80" y="210" fill="#8b949e" font-size="11">#15 by MriFox - 2 commits</text>
  <rect x="500" y="185" width="50" height="20" fill="#d4edda" rx="4"/>
  <text x="508" y="199" fill="#22863a" font-size="10">Open</text>
  
  <rect x="40" y="240" width="520" height="70" fill="white" stroke="#d0d7de" rx="4"/>
  <circle cx="60" cy="275" r="12" fill="#8250df"/>
  <text x="80" y="270" fill="#24292f" font-size="13" font-weight="bold">修复样式问题</text>
  <text x="80" y="290" fill="#8b949e" font-size="11">#14 by MriFox - 3 commits</text>
  <rect x="485" y="265" width="65" height="20" fill="#d4edda" rx="4"/>
  <text x="490" y="279" fill="#22863a" font-size="10">Merged</text>
  
  <!-- 箭头指向New pull request按钮 -->
  <path d="M 570 115 L 570 125 L 575 125 L 565 140 L 555 125 L 560 125 L 560 115 Z" fill="#0969da"/>
  <text x="530" y="110" fill="#0969da" font-size="12" font-weight="bold">点击这里</text>
  
  <!-- 选中框 -->
  <rect x="395" y="115" width="170" height="45" fill="none" stroke="#0969da" stroke-width="2" rx="6" stroke-dasharray="5,5"/>
</svg>
