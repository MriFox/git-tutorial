<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="600" height="400" fill="#f6f8fa"/>
  
  <!-- 顶部导航栏 -->
  <rect width="600" height="50" fill="#24292f"/>
  <text x="20" y="32" fill="white" font-size="16" font-weight="bold">GitHub</text>
  
  <!-- 标签栏 -->
  <rect x="0" y="50" width="600" height="45" fill="#f6f8fa"/>
  <rect x="150" y="50" width="100" height="45" fill="#f6f8fa"/>
  <text x="160" y="78" fill="#24292f" font-size="13">代码</text>
  <rect x="260" y="50" width="80" height="45" fill="#f6f8fa"/>
  <text x="270" y="78" fill="#24292f" font-size="13">Issues</text>
  <rect x="350" y="50" width="100" height="45" fill="#f6f8fa"/>
  <text x="355" y="78" fill="#24292f" font-size="13">Pull requests</text>
  
  <!-- Issues页面内容 -->
  <rect x="20" y="110" width="560" height="270" fill="white" rx="6"/>
  
  <!-- 标题和按钮 -->
  <text x="40" y="140" fill="#24292f" font-size="18" font-weight="bold">Issues</text>
  
  <!-- New issue按钮 -->
  <rect x="450" y="120" width="120" height="35" fill="#2da44e" rx="6"/>
  <text x="470" y="142" fill="white" font-size="13" font-weight="bold">New issue</text>
  
  <!-- 搜索框 -->
  <rect x="40" y="155" width="520" height="35" fill="white" stroke="#d0d7de" rx="4"/>
  <text x="50" y="177" fill="#8b949e" font-size="12">搜索或新建 Issue...</text>
  
  <!-- Issue列表 -->
  <rect x="40" y="200" width="520" height="60" fill="white" stroke="#d0d7de" rx="4"/>
  <circle cx="60" cy="230" r="12" fill="#2da44e"/>
  <text x="80" y="225" fill="#24292f" font-size="13" font-weight="bold">修复登录页面的样式问题</text>
  <text x="80" y="245" fill="#8b949e" font-size="11">#12 opened 2 hours ago</text>
  <rect x="500" y="220" width="40" height="20" fill="#d4edda" rx="4"/>
  <text x="505" y="234" fill="#22863a" font-size="10">bug</text>
  
  <rect x="40" y="270" width="520" height="60" fill="white" stroke="#d0d7de" rx="4"/>
  <circle cx="60" cy="300" r="12" fill="#2da44e"/>
  <text x="80" y="295" fill="#24292f" font-size="13" font-weight="bold">添加用户头像功能</text>
  <text x="80" y="315" fill="#8b949e" font-size="11">#11 opened 1 day ago</text>
  <rect x="500" y="290" width="50" height="20" fill="#fff3cd" rx="4"/>
  <text x="503" y="304" fill="#856404" font-size="10">enhancement</text>
  
  <!-- 箭头指向New issue按钮 -->
  <path d="M 570 115 L 570 125 L 575 125 L 565 140 L 555 125 L 560 125 L 560 115 Z" fill="#0969da"/>
  <text x="530" y="110" fill="#0969da" font-size="12" font-weight="bold">点击这里</text>
  
  <!-- 选中框 -->
  <rect x="445" y="115" width="130" height="45" fill="none" stroke="#0969da" stroke-width="2" rx="6" stroke-dasharray="5,5"/>
</svg>
